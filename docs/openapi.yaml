openapi: "3.0.3"
info:
  title: ZuzuFlow API
  version: "1.0.0"
  description: |
    REST API for ZuzuFlow.
    All endpoints are under `/api`. Executions broadcast real-time events
    over WebSocket at `ws://<host>/ws/executions?id=<executionId>`.

servers:
  - url: http://localhost:4000/api
    description: Local development

tags:
  - name: Workflows
    description: Create, read, update, delete and activate/deactivate workflows
  - name: Executions
    description: Start, list, inspect and cancel workflow executions
  - name: Credentials
    description: Manage encrypted credentials (API keys, connection strings, etc.)
  - name: Webhooks
    description: Register inbound webhook endpoints that trigger workflows
  - name: CustomNodes
    description: Author reusable node kinds ("Custom Node Builder") — org-scoped library that travels through git sync

# ─── Reusable schemas ──────────────────────────────────────────────────────────

components:
  schemas:

    WorkflowStatus:
      type: string
      enum: [draft, active, inactive, archived]

    ExecutionStatus:
      type: string
      enum: [pending, running, completed, failed, cancelled, timed_out]

    WorkflowTemplate:
      type: object
      required: [version, nodes, edges]
      properties:
        version:
          type: string
          example: "1.0"
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowEdge"

    WorkflowNode:
      type: object
      required: [id, kind, label, config]
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          description: |
            Discriminator for `config`. The canonical list lives in
            `packages/shared/src/types/workflow.ts` — any kind declared there
            is accepted by the API.
            Notable ones:
              * `manual` — "Immediate" trigger. Runs the workflow on demand.
                Config `{ value?: string, valueType?: "string"|"number"|"boolean"|"json" }`.
                When the caller passes an explicit `triggerPayload` the payload
                wins; otherwise the configured `value` is coerced by `valueType`
                and used as the trigger's output.
              * `custom_builder` — user-authored node from the in-app Custom
                Node Builder (see `docs/CUSTOM_NODES.md`). Config carries a
                full template snapshot so workflows are self-contained.
              * `group` — canvas-only container that visually groups child
                nodes. Has no execution semantics: children declare their
                parent via `parentId` and the GraphInterpreter no-ops the kind.
              * Azure: `azure_blob`, `azure_service_bus`, `azure_cosmos_db`,
                `azure_key_vault`, `azure_functions` — native Azure Cloud
                nodes. Share the `azure` credential kind; fields vary by
                auth style (connection string / shared key / SAS / service
                principal / function key). Key Vault requires a Service
                Principal + vault URL.
              * Google Cloud: `gcp_storage`, `gcp_pubsub`, `gcp_bigquery` —
                first-class GCP nodes. All use the `gcp` credential kind
                (service account JSON).
              * Oracle Cloud: `oracle_db`, `oci_object_storage` — Oracle
                Database queries via node-oracledb's Thin client and OCI
                Object Storage via signed-request auth. Use the `oracle`
                and `oci` credential kinds respectively.
              * SaaS Integrations (Phase 2 — 29 nodes): `stripe`, `github`,
                `discord`, `notion`, `salesforce`, `jira`, `ms_teams`,
                `hubspot`, `airtable`, `pagerduty`, `gitlab`, `linear`,
                `telegram`, `sendgrid`, `sentry`, `shopify`, `mailchimp`,
                `google_drive`, `dropbox`, `datadog`, `paypal`, `square`,
                `resend`, `onedrive`, `box`, `circleci`, `whatsapp_business`,
                `pipedrive`, `customer_io` — first-class natives using each
                provider's official SDK where available (Octokit for GitHub,
                `stripe` Node SDK, `@notionhq/client`, `jsforce`,
                `@sendgrid/mail`, `googleapis` for Drive) and the provider's
                REST / GraphQL API over HTTP otherwise. Each has its own
                credential kind with a minimal shape:
                `stripe` = `{ apiKey }`, `github` = `{ token }`, `discord` =
                `{ webhookUrl }` or `{ botToken }`, `notion` = `{ token }`,
                `salesforce` = `{ loginUrl, username, password, securityToken }`
                or `{ instanceUrl, accessToken }`, `jira` = `{ baseUrl, email,
                apiToken }`, `ms_teams` = `{ webhookUrl }`, `hubspot` =
                `{ privateAppToken }` or `{ apiKey }`, `airtable` =
                `{ apiKey }`, `pagerduty` = `{ routingKey }` or `{ apiToken }`,
                `gitlab` = `{ baseUrl?, token }`, `linear` = `{ apiKey }`,
                `telegram` = `{ botToken }`, `sendgrid` = `{ apiKey }`,
                `sentry` = `{ dsn }` (Store API) or `{ authToken,
                organizationSlug, projectSlug }` (REST API), `shopify` =
                `{ shopDomain, accessToken }`, `mailchimp` = `{ apiKey }`
                (must include -dc suffix, e.g. "abc-us21"), `google_drive`
                uses the `gcp` kind `{ serviceAccountJson }` or
                `google_drive_oauth` `{ accessToken }`, `dropbox` =
                `{ accessToken }`, `datadog` = `{ apiKey, appKey?, site? }`,
                `paypal` = `{ clientId, clientSecret, environment? }`,
                `square` = `{ accessToken, environment? }`, `resend` =
                `{ apiKey }`, `onedrive` = `{ accessToken }`, `box` =
                `{ accessToken }`, `circleci` = `{ token }`,
                `whatsapp_business` = `{ accessToken, phoneNumberId }`,
                `pipedrive` = `{ apiToken, companyDomain }`, `customer_io` =
                `{ siteId, apiKey, appApiKey?, region? }`.
              * Streaming + Analytics (Phase 3 — 5 nodes): `kafka`, `nats`,
                `snowflake`, `clickhouse`, `elasticsearch` — native driver
                activities (kafkajs, nats.js, snowflake-sdk,
                @clickhouse/client, @elastic/elasticsearch) with lazy imports
                at the activity boundary. Credential shapes:
                `kafka` = `{ brokers, clientId?, ssl?, sasl?, saslMechanism?,
                username?, password? }` (brokers is a CSV list),
                `nats` = `{ servers, user?, pass?, token? }`, `snowflake` =
                `{ account, username, password? | privateKey?, database?,
                schema?, warehouse?, role? }`, `clickhouse` =
                `{ url, username?, password?, database? }`, `elasticsearch` =
                `{ node, apiKey? | (username + password), ca? }`.
              * AI ecosystem (Phase 4 — 5 nodes): `ai_image`, `ai_transcribe`,
                `ai_tts`, `ai_embed`, `vector_db` — each is multi-provider
                with a `provider` selector. Credentials are shared with or
                added alongside existing LLM kinds: `ai_image` uses `openai`
                or new `stability`; `ai_transcribe` uses `openai` or new
                `assemblyai`; `ai_tts` uses `openai` or new `elevenlabs`;
                `ai_embed` uses `openai` / new `cohere` / `huggingface`;
                `vector_db` selects one of `pinecone` = `{ apiKey, indexHost }`,
                `weaviate` = `{ url, apiKey? }`, or `qdrant` =
                `{ url, apiKey? }`.
          example: http_request
        label:
          type: string
          example: "Fetch User Data"
        config:
          type: object
          description: Node-specific configuration. Shape depends on `kind`.
          example: { url: "https://api.example.com/users", method: "GET" }
        position:
          type: object
          properties:
            x: { type: number }
            y: { type: number }
          description: |
            World-space position for free nodes; parent-relative for nodes
            inside a group (i.e. whose `parentId` is set).
        parentId:
          type: string
          description: |
            When set, points at a `group` node. The canvas renders this node
            nested inside the group and freezes it if the group is locked.
            Position becomes parent-relative while `parentId` is set.
          example: "grp_a7b3k"
        style:
          type: object
          description: |
            Per-node visual overrides (header colour, Lucide icon name, and
            handle positions for enterprise-grade LR layouts).
          properties:
            headerColor: { type: string }
            icon: { type: string }
            handlePositions:
              type: object
              properties:
                input:
                  type: string
                  enum: [left, right, top, bottom]
                output:
                  type: string
                  enum: [left, right, top, bottom]

    WorkflowEdge:
      type: object
      required: [id, source, target]
      properties:
        id:
          type: string
          format: uuid
        source:
          type: string
          description: Source node ID
        target:
          type: string
          description: Target node ID
        sourceHandle:
          type: string
          description: Handle name (e.g. "true", "false" for If/Else; case values for Switch)
        label:
          type: string

    Workflow:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "Daily Report Generator"
        description:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/WorkflowStatus"
        template:
          $ref: "#/components/schemas/WorkflowTemplate"
        version:
          type: integer
          description: Incremented on each update
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WorkflowListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/WorkflowStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WorkflowList:
      type: object
      properties:
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowListItem"

    Execution:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workflowId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/ExecutionStatus"
        triggerPayload:
          type: object
          nullable: true
        output:
          type: object
          nullable: true
        error:
          type: string
          nullable: true
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true

    ExecutionList:
      type: object
      properties:
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/Execution"

    CredentialKind:
      type: string
      enum:
        - postgres
        - smtp
        - sendgrid
        - mqtt
        - http_bearer
        - http_basic
        - http_api_key
        - generic

    Credential:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "Production Postgres"
        kind:
          $ref: "#/components/schemas/CredentialKind"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: string

    # ── Custom Node Builder ──────────────────────────────────────────────────

    CustomBuilderHandle:
      type: object
      required: [id, label]
      properties:
        id:
          type: string
          example: "out"
        label:
          type: string
          example: "out"

    CustomBuilderInputField:
      type: object
      required: [name, label, type]
      properties:
        name:
          type: string
          description: Stable key — referenced from user code as `input.fields.<name>`
        label:
          type: string
        type:
          type: string
          enum: [string, number, boolean, select, textarea, json, credential]
        required:
          type: boolean
        default: {}
        description:
          type: string
        options:
          type: array
          items:
            type: object
            required: [value, label]
            properties:
              value: { type: string }
              label: { type: string }

    CustomBuilderHttpTemplate:
      type: object
      required: [method, url]
      properties:
        method:
          type: string
          enum: [GET, POST, PUT, PATCH, DELETE]
        url:
          type: string
          description: Supports `{{fields.X}}` and `{{nodeId.field}}` interpolation
        headers:
          type: array
          items:
            type: object
            properties:
              key: { type: string }
              value: { type: string }
        queryParams:
          type: array
          items:
            type: object
            properties:
              key: { type: string }
              value: { type: string }
        bodyTemplate:
          type: string

    CustomNodeTemplateInput:
      type: object
      required: [name, handles, inputsSchema, executionMode]
      description: |
        Server-side Zod validates `code` is present when `executionMode=sandbox`
        and `httpTemplate` is present when `executionMode=http`.
      properties:
        name:
          type: string
          example: "Slugify"
        description:
          type: string
        icon:
          type: string
          description: Lucide icon name
          example: "Link"
        color:
          type: string
          pattern: "^#[0-9a-fA-F]{6}$"
          example: "#8b5cf6"
        category:
          type: string
          example: "utilities"
        handles:
          type: object
          required: [inputs, outputs]
          properties:
            inputs:
              type: array
              items:
                $ref: "#/components/schemas/CustomBuilderHandle"
            outputs:
              type: array
              minItems: 1
              items:
                $ref: "#/components/schemas/CustomBuilderHandle"
        inputsSchema:
          type: array
          items:
            $ref: "#/components/schemas/CustomBuilderInputField"
        executionMode:
          type: string
          enum: [sandbox, http]
        code:
          type: string
          description: |
            TS source when `executionMode=sandbox`. Must define
            `async function run(input)` that returns JSON-serialisable data.
            Access user input as `input.fields.<name>`, upstream outputs via
            `input.context`. For multi-output routing, return
            `{ __handle: "<outputId>", value: ... }`.
        httpTemplate:
          $ref: "#/components/schemas/CustomBuilderHttpTemplate"
        credentialType:
          type: string
          description: When set, placed nodes render a credential selector
        isPublic:
          type: boolean
          description: Visible to every org on this self-hosted instance when true
        key:
          type: string
          pattern: "^cn_[a-z0-9_-]{4,40}$"
          description: Auto-generated when omitted (e.g. `cn_a7b3k2m9pq`)

    CustomNodeTemplate:
      allOf:
        - $ref: "#/components/schemas/CustomNodeTemplateInput"
        - type: object
          properties:
            id:
              type: string
              format: uuid
            organizationId:
              type: string
            version:
              type: integer
              example: 1
            gitSyncedAt:
              type: string
              format: date-time
              nullable: true
              description: Set when the template arrived via git pull; preserved on subsequent pulls
            originHash:
              type: string
              nullable: true
              description: SHA-256 of the canonical JSON payload as committed to git
            createdById:
              type: string
              nullable: true
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

# ─── Paths ────────────────────────────────────────────────────────────────────

paths:

  # ── Workflows ────────────────────────────────────────────────────────────────

  /workflows:
    get:
      tags: [Workflows]
      summary: List workflows
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/WorkflowStatus"
          description: Filter by status
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Paginated list of workflows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowList"

    post:
      tags: [Workflows]
      summary: Create a workflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, template]
              properties:
                name:
                  type: string
                  example: "My Workflow"
                description:
                  type: string
                template:
                  $ref: "#/components/schemas/WorkflowTemplate"
      responses:
        "201":
          description: Workflow created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"
        "422":
          description: Invalid template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workflows/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags: [Workflows]
      summary: Get a workflow (includes template)
      responses:
        "200":
          description: Workflow detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"
        "404":
          description: Not found

    put:
      tags: [Workflows]
      summary: Update a workflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                template:
                  $ref: "#/components/schemas/WorkflowTemplate"
      responses:
        "200":
          description: Updated workflow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"

    delete:
      tags: [Workflows]
      summary: Delete a workflow
      responses:
        "204":
          description: Deleted

  /workflows/{id}/activate:
    post:
      tags: [Workflows]
      summary: Activate a workflow
      description: |
        Sets status to `active`. If the workflow contains a Cron trigger node,
        a Temporal Schedule is created so it fires automatically.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Activated workflow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"

  /workflows/{id}/deactivate:
    post:
      tags: [Workflows]
      summary: Deactivate a workflow
      description: |
        Sets status to `inactive`. If a Temporal Schedule exists (from a Cron trigger),
        it is deleted so no further automatic runs are scheduled.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deactivated workflow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"

  # ── Executions ───────────────────────────────────────────────────────────────

  /executions/start:
    post:
      tags: [Executions]
      summary: Start a workflow execution
      description: |
        Manually triggers a workflow. The workflow must be in `active` status
        (save + activate it first). Returns immediately with the new execution
        record — monitor progress via WebSocket.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workflowId]
              properties:
                workflowId:
                  type: string
                  format: uuid
                triggerPayload:
                  type: object
                  description: |
                    Arbitrary JSON passed as the trigger node's output. For
                    an **Immediate** (`kind: manual`) trigger, a non-empty
                    payload here overrides the node's configured `value`; an
                    empty payload lets the configured value flow through
                    instead (coerced by `valueType`).
      responses:
        "201":
          description: Execution started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Execution"
        "409":
          description: Workflow is not active

  /executions:
    get:
      tags: [Executions]
      summary: List executions
      parameters:
        - name: workflowId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by workflow
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ExecutionStatus"
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Paginated execution list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionList"

  /executions/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags: [Executions]
      summary: Get an execution (includes node logs)
      responses:
        "200":
          description: Execution detail with logs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Execution"
                  - type: object
                    properties:
                      logs:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: string }
                            nodeId: { type: string }
                            nodeKind: { type: string }
                            level: { type: string, enum: [debug, info, warn, error] }
                            message: { type: string }
                            data: { type: object }
                            createdAt: { type: string, format: date-time }

    delete:
      tags: [Executions]
      summary: Cancel or delete an execution
      description: |
        If the execution is still running, it is cancelled in Temporal and marked `cancelled`.
        If the execution is already in a terminal state (completed, failed, cancelled), the
        record is deleted from the database.
      responses:
        "204":
          description: Deleted (terminal execution)
        "200":
          description: Cancelled (was running)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Execution"

  # ── Credentials ──────────────────────────────────────────────────────────────

  /credentials:
    get:
      tags: [Credentials]
      summary: List credentials (no secret data returned)
      responses:
        "200":
          description: List of credentials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Credential"

    post:
      tags: [Credentials]
      summary: Create a credential
      description: |
        Secret values in `data` are encrypted with AES-256-GCM before storage.
        They are never returned by the list or get endpoints.

        **Credential kinds and expected `data` fields:**

        | kind | fields |
        |------|--------|
        | `postgres` | `connectionString` |
        | `smtp` | `host`, `port`, `user`, `pass`, `from`, `secure` |
        | `sendgrid` | `apiKey`, `from` |
        | `mqtt` | `brokerUrl`, `username`, `password` |
        | `http_bearer` | `token` |
        | `http_basic` | `username`, `password` |
        | `http_api_key` | `headerName`, `headerValue` |
        | `generic` | any key-value pairs |
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, kind, data]
              properties:
                name:
                  type: string
                  example: "Production DB"
                kind:
                  $ref: "#/components/schemas/CredentialKind"
                data:
                  type: object
                  additionalProperties:
                    type: string
                  example: { connectionString: "postgresql://user:pass@host/db" }
      responses:
        "201":
          description: Credential created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Credential"

  /credentials/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    put:
      tags: [Credentials]
      summary: Update a credential
      description: Provide `name` to rename, `data` to re-encrypt with new values.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                data:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        "200":
          description: Updated credential
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Credential"
        "404":
          description: Not found

    delete:
      tags: [Credentials]
      summary: Delete a credential
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ── Webhooks ─────────────────────────────────────────────────────────────────

  /webhooks/register:
    post:
      tags: [Webhooks]
      summary: Register a webhook endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workflowId, path]
              properties:
                workflowId:
                  type: string
                  format: uuid
                path:
                  type: string
                  description: URL path segment (must be unique)
                  example: "my-webhook"
                method:
                  type: string
                  enum: [GET, POST, PUT, PATCH, DELETE]
                  default: POST
                secret:
                  type: string
                  description: HMAC-SHA256 verification secret
      responses:
        "201":
          description: Webhook endpoint registered

  /webhooks/inbound/{path}:
    post:
      tags: [Webhooks]
      summary: Inbound webhook trigger
      description: |
        Send data to this URL to trigger the associated workflow.
        If a secret was set during registration, include the HMAC-SHA256
        signature in the `X-Hub-Signature-256` header.
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          example: my-webhook
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Workflow triggered
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                  executionId:
                    type: string
                    format: uuid

  # ── Custom Nodes (org-scoped library) ───────────────────────────────────────

  /custom-nodes:
    get:
      tags: [CustomNodes]
      summary: List custom node templates
      description: |
        Returns templates visible to the caller's organisation — own
        templates plus any `isPublic: true` templates from other orgs on this
        instance. Templates are **organisation-scoped**, not environment-scoped:
        one library serves dev / staging / prod for the same org.
      responses:
        "200":
          description: "Array wrapped as `{ items: [...] }`"
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/CustomNodeTemplate"

    post:
      tags: [CustomNodes]
      summary: Create a custom node template
      description: |
        The payload is validated server-side against the same schema as
        manual saves. `executionMode` picks between a sandboxed TypeScript
        body (`code`) or a parameterised HTTP call (`httpTemplate`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomNodeTemplateInput"
      responses:
        "201":
          description: Template created (schedules a git auto-push if configured)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomNodeTemplate"
        "409":
          description: Key collision within the org
        "422":
          description: Validation error

  /custom-nodes/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags: [CustomNodes]
      summary: Get one template
      responses:
        "200":
          description: Template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomNodeTemplate"
        "404":
          description: Not found (or belongs to another non-public org)

    patch:
      tags: [CustomNodes]
      summary: Update a template (bumps `version`)
      description: |
        Existing workflows are unaffected — they run from the snapshot
        embedded in each placed node. The Properties panel shows an
        "Upgrade" banner on nodes whose snapshot is older than the template.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomNodeTemplateInput"
      responses:
        "200":
          description: Updated template (schedules a git auto-push if configured)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomNodeTemplate"

    delete:
      tags: [CustomNodes]
      summary: Delete a template
      description: |
        Workflows that already snapshotted this template keep running. On git
        pull, other environments will also drop this template (if it arrived
        via git originally — local-only templates are preserved).
      responses:
        "204":
          description: Deleted

  /custom-nodes/generate:
    post:
      tags: [CustomNodes]
      summary: AI-assisted draft (no persistence)
      description: |
        Uses the org's configured LLM (Settings → AI) to produce a draft
        custom node. The response is validated against the same schema as
        manual saves — if the LLM returns malformed JSON, the call 422s.
        The caller reviews in the builder modal and explicitly saves via
        `POST /custom-nodes`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt:
                  type: string
                  example: "a node that takes an email and returns the domain"
      responses:
        "200":
          description: Draft template (review, then POST /custom-nodes to save)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomNodeTemplateInput"
        "403":
          description: AI Builder not enabled for this organisation
        "422":
          description: LLM output did not parse or failed schema validation

# ─── WebSocket ────────────────────────────────────────────────────────────────

x-websocket:
  description: |
    Connect to `ws://<host>/ws/executions?id=<executionId>` to receive
    real-time events for an execution.

    **Event shapes:**

    ```json
    {
      "kind": "node_started | node_completed | node_failed | execution_started | execution_completed | execution_failed | execution_cancelled",
      "executionId": "uuid",
      "workflowId": "uuid",
      "nodeId": "uuid",
      "nodeKind": "http_request",
      "payload": { ... },
      "timestamp": "2026-04-10T12:00:00.000Z"
    }
    ```

    `payload.data.output` on `node_completed` events contains the node's return value.
