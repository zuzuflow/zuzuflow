# =============================================================================
# ZuzuFlow — Nginx reverse proxy configuration
# SSL certificates managed by Certbot (run after initial setup)
# =============================================================================

# ---- Workflow Editor (app.zuzuflow.com) ----
server {
    listen 80;
    server_name app.zuzuflow.com;

    # Certbot will add SSL config here after running:
    # certbot --nginx -d app.zuzuflow.com

    # Frontend SPA
    location / {
        proxy_pass http://127.0.0.1:30000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:30001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }

    # Internal routes (worker callbacks)
    location /internal/ {
        proxy_pass http://127.0.0.1:30001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:30001;
        proxy_set_header Host $host;
    }

    # WebSocket
    location /ws {
        proxy_pass http://127.0.0.1:30001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

# NOTE: zuzuflow.com / www.zuzuflow.com (marketing site) has moved to the
# zuzuflow-website repo. Install that repo's deploy/nginx/website.zuzuflow.conf
# into /etc/nginx/sites-enabled/ on this host separately.

# ---- Temporal UI (temporal.zuzuflow.com) — Admin only ----
server {
    listen 80;
    server_name temporal.zuzuflow.com;

    # Certbot will add SSL config here after running:
    # certbot --nginx -d temporal.zuzuflow.com

    # Basic auth — create with: htpasswd -c /etc/nginx/.htpasswd admin
    auth_basic "Temporal Admin";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass http://127.0.0.1:30080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
