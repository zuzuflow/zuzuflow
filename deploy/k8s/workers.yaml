apiVersion: apps/v1
kind: Deployment
metadata:
  name: workers
  namespace: workflow
  labels:
    app: workers
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workers
  template:
    metadata:
      labels:
        app: workers
    spec:
      initContainers:
        # Wait for Temporal to be ready
        - name: wait-for-temporal
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z temporal-svc 7233; do
                echo "Waiting for Temporal..."
                sleep 5
              done
              echo "Temporal is ready!"
      containers:
        - name: workers
          image: localhost:5000/workflow-workers:latest
          # isolated-vm is baked into the image at /app/apps/workers/node_modules/isolated-vm
          # (see Dockerfile.workers + deploy/scripts/build-ivm.sh). No hostPath volume needed.
          envFrom:
            - configMapRef:
                name: workflow-config
            - secretRef:
                name: workflow-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1500m"
      # No service needed — workers connect outbound to Temporal
