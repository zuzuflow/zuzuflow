apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-ui
  namespace: workflow
  labels:
    app: temporal-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-ui
  template:
    metadata:
      labels:
        app: temporal-ui
    spec:
      containers:
        - name: temporal-ui
          image: temporalio/ui:2.28.0
          ports:
            - containerPort: 8080
          env:
            - name: TEMPORAL_ADDRESS
              value: "temporal-svc:7233"
            - name: TEMPORAL_CORS_ORIGINS
              value: "https://app.zuzuflow.com"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-ui-svc
  namespace: workflow
spec:
  selector:
    app: temporal-ui
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
  type: NodePort
