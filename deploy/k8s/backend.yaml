apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: workflow
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        # Wait for Temporal to be ready
        - name: wait-for-temporal
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z temporal-svc 7233; do
                echo "Waiting for Temporal..."
                sleep 5
              done
              echo "Temporal is ready!"
      containers:
        - name: backend
          image: localhost:5000/workflow-backend:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: workflow-config
            - secretRef:
                name: workflow-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: workflow
spec:
  selector:
    app: backend
  ports:
    - port: 3001
      targetPort: 3001
      nodePort: 30001
  type: NodePort
