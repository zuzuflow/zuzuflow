apiVersion: v1
kind: ConfigMap
metadata:
  name: workflow-config
  namespace: workflow
data:
  NODE_ENV: "production"
  PORT: "3001"
  TEMPORAL_ADDRESS: "temporal-svc:7233"
  TEMPORAL_NAMESPACE: "default"
  TEMPORAL_TASK_QUEUE: "workflow-interpreter"
  BACKEND_INTERNAL_URL: "http://backend-svc:3001"
  CORS_ORIGINS: "https://app.zuzuflow.com,https://zuzuflow.com"
  REDIS_URL: "redis://redis-svc:6379"
  LOG_LEVEL: "info"
  INITIAL_ADMIN_USERNAME: "admin"
