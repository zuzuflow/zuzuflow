{{- if .Values.temporal.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "zuzuflow.temporalServiceName" . }}
  labels:
    {{- include "zuzuflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: temporal
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: 7233
      targetPort: grpc
  selector:
    {{- include "zuzuflow.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: temporal
{{- end }}
