{{- if .Values.temporal.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zuzuflow.temporalServiceName" . }}
  labels:
    {{- include "zuzuflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: temporal
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "zuzuflow.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: temporal
  template:
    metadata:
      labels:
        {{- include "zuzuflow.labels" . | nindent 8 }}
        app.kubernetes.io/component: temporal
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.postgres.enabled }}
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h {{ include "zuzuflow.postgresServiceName" . }} -p 5432 -U $POSTGRES_USER; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "zuzuflow.secretName" . }}
                  key: POSTGRES_USER
      {{- end }}
      containers:
        - name: temporal
          image: {{ .Values.temporal.image | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              export BIND_ON_IP=$(getent hosts "$(hostname)" | awk '{print $1;}')
              export TEMPORAL_ADDRESS="${BIND_ON_IP}:7233"
              export TEMPORAL_CLI_ADDRESS="${TEMPORAL_ADDRESS}"
              dockerize -template /etc/temporal/config/config_template.yaml:/etc/temporal/config/docker.yaml
              exec temporal-server --env docker start \
                --service frontend \
                --service history \
                --service matching \
                --service worker
          ports:
            - name: grpc
              containerPort: 7233
          env:
            - name: DB
              value: postgres12
            - name: DB_PORT
              value: "5432"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "zuzuflow.secretName" . }}
                  key: POSTGRES_USER
            - name: POSTGRES_PWD
              valueFrom:
                secretKeyRef:
                  name: {{ include "zuzuflow.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_SEEDS
              {{- if .Values.postgres.enabled }}
              value: {{ include "zuzuflow.postgresServiceName" . | quote }}
              {{- else }}
              value: ""   # BYO Postgres — not currently supported for embedded Temporal
              {{- end }}
            - name: DYNAMIC_CONFIG_FILE_PATH
              value: config/dynamicconfig/development-sql.yaml
          volumeMounts:
            - name: dyn
              mountPath: /etc/temporal/config/dynamicconfig
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 10
          resources:
            {{- toYaml .Values.temporal.resources | nindent 12 }}
      volumes:
        - name: dyn
          configMap:
            name: {{ include "zuzuflow.fullname" . }}-temporal-dyn
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
