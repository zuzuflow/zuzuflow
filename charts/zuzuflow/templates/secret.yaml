{{/*
  Secret bundle — generated on first install, preserved across upgrades.

  Precedence per field:
    1. User-supplied value via --set or values.yaml
    2. Existing value in the cluster (preserved across `helm upgrade`)
    3. Newly generated random value (first install only)

  MFA_ENCRYPTION_KEY must be exactly 64 hex chars. We generate it by hashing
  a random string so the output is always hex.
*/}}
{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (include "zuzuflow.secretName" .)) | default dict -}}
{{- $existingData := $existingSecret.data | default dict -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "zuzuflow.secretName" . }}
  labels:
    {{- include "zuzuflow.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ include "zuzuflow.preserveOrGen" (list .Values.secrets.jwtSecret (index $existingData "JWT_SECRET") (randAlphaNum 64)) | quote }}
  API_TOKEN: {{ include "zuzuflow.preserveOrGen" (list .Values.secrets.apiToken (index $existingData "API_TOKEN") (randAlphaNum 32)) | quote }}
  ENCRYPTION_KEY: {{ include "zuzuflow.preserveOrGen" (list .Values.secrets.encryptionKey (index $existingData "ENCRYPTION_KEY") (randAlphaNum 32)) | quote }}
  MFA_ENCRYPTION_KEY: {{ include "zuzuflow.preserveOrGen" (list .Values.secrets.mfaEncryptionKey (index $existingData "MFA_ENCRYPTION_KEY") (randAlphaNum 32 | sha256sum)) | quote }}
  WEBHOOK_SECRET: {{ include "zuzuflow.preserveOrGen" (list .Values.secrets.webhookSecret (index $existingData "WEBHOOK_SECRET") (randAlphaNum 32)) | quote }}
  {{- if .Values.postgres.enabled }}
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
  POSTGRES_PASSWORD: {{ include "zuzuflow.preserveOrGen" (list .Values.postgres.password (index $existingData "POSTGRES_PASSWORD") (randAlphaNum 24)) | quote }}
  {{- end }}
  INITIAL_ADMIN_PASSWORD: {{ include "zuzuflow.preserveOrGen" (list .Values.initialAdmin.password (index $existingData "INITIAL_ADMIN_PASSWORD") (randAlphaNum 16)) | quote }}
  {{- if .Values.smtp.enabled }}
  SMTP_PASS: {{ .Values.smtp.password | quote }}
  {{- end }}
  DATABASE_URL: {{ include "zuzuflow.databaseUrl" . | quote }}
