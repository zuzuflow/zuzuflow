{{- if .Values.ingress.enabled }}
{{/*
  Single-host, path-based ingress.
    /api/*       → backend
    /internal/*  → backend   (inbound webhook callbacks)
    /health      → backend
    /            → frontend  (SPA)
*/}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "zuzuflow.fullname" . }}
  labels:
    {{- include "zuzuflow.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "zuzuflow.backendServiceName" . }}
                port:
                  number: {{ .Values.backend.service.port }}
          - path: /internal
            pathType: Prefix
            backend:
              service:
                name: {{ include "zuzuflow.backendServiceName" . }}
                port:
                  number: {{ .Values.backend.service.port }}
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: {{ include "zuzuflow.backendServiceName" . }}
                port:
                  number: {{ .Values.backend.service.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "zuzuflow.frontendServiceName" . }}
                port:
                  number: {{ .Values.frontend.service.port }}
{{- end }}
