apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zuzuflow.backendServiceName" . }}
  labels:
    {{- include "zuzuflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "zuzuflow.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "zuzuflow.labels" . | nindent 8 }}
        app.kubernetes.io/component: backend
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "zuzuflow.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.temporal.enabled }}
      initContainers:
        - name: wait-for-temporal
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "zuzuflow.temporalServiceName" . }} 7233; do
                echo "Waiting for Temporal..."
                sleep 5
              done
      {{- end }}
      containers:
        - name: backend
          image: {{ include "zuzuflow.image" (dict "name" "backend" "root" .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3001
          envFrom:
            - configMapRef:
                name: {{ include "zuzuflow.configMapName" . }}
            - secretRef:
                name: {{ include "zuzuflow.secretName" . }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
