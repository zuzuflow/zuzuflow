<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <title>ZuzuFlow</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Ears -->
  <circle cx="7" cy="14" r="4" fill="#a78bfa"/>
  <circle cx="7" cy="14" r="2.5" fill="#c4b5fd"/>
  <circle cx="25" cy="14" r="4" fill="#a78bfa"/>
  <circle cx="25" cy="14" r="2.5" fill="#c4b5fd"/>
  <!-- Head -->
  <ellipse cx="16" cy="16" rx="9" ry="10" fill="#ddd6fe"/>
  <!-- Muzzle -->
  <ellipse cx="16" cy="19" rx="6" ry="5.5" fill="#f5f3ff"/>
  <!-- Eyes -->
  <circle cx="12.5" cy="14" r="1.8" fill="#1e1b4b"/>
  <circle cx="19.5" cy="14" r="1.8" fill="#1e1b4b"/>
  <circle cx="13" cy="13.3" r="0.6" fill="white"/>
  <circle cx="20" cy="13.3" r="0.6" fill="white"/>
  <!-- Nostrils -->
  <ellipse cx="14.5" cy="18.5" rx="1" ry="0.8" fill="#7c3aed"/>
  <ellipse cx="17.5" cy="18.5" rx="1" ry="0.8" fill="#7c3aed"/>
  <!-- Smile -->
  <path d="M13.5 21 C14.5 22.5 17.5 22.5 18.5 21" stroke="#7c3aed" stroke-width="0.8" stroke-linecap="round" fill="none"/>
