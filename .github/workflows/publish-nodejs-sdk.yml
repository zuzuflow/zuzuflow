# =============================================================================
# Publish @zuzuflow/nodejs-sdk to npm
#
# Triggered by pushing a tag of the form `nodejs-sdk-v<version>` — e.g.
#   git tag nodejs-sdk-v0.1.1 && git push origin nodejs-sdk-v0.1.1
#
# The workflow verifies the tag version matches sdk/nodejs-sdk/package.json
# before building and publishing with npm provenance.
# =============================================================================
name: Publish nodejs-sdk

on:
  push:
    tags:
      - 'nodejs-sdk-v*'
  workflow_dispatch:  # Allow manual runs from the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for npm provenance attestations

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Configure npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          echo "@zuzuflow:registry=https://registry.npmjs.org/" >> ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/nodejs-sdk-v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#nodejs-sdk-v}"
          PKG_VERSION=$(node -p "require('./sdk/nodejs-sdk/package.json').version")
          echo "Tag: $TAG_VERSION  Package: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json ($PKG_VERSION)"
            exit 1
          fi

      - name: Build
        run: pnpm --filter @zuzuflow/nodejs-sdk build

      - name: Publish to npm
        run: pnpm --filter @zuzuflow/nodejs-sdk publish --access public --no-git-checks --provenance
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
